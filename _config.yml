# Site settings
title: "Remi Toyin Catheria Claire Bara"
description: "Computer Engineering | AI Researcher | YTB Scholar"
url: "https://Catheria29.github.io" # Your site's URL
baseurl: "" # Leave empty
repository: "Catheria29/Catheria29.github.io"
teaser: "/assets/images/teaser.jpg" # Default teaser image
locale: "en-US"

# Minimal Mistakes Settings
minimal_mistakes_skin: "default" # Options: air, aqua, contrast, dark, dirt, neon, sunrise
search: true

# Author Settings
author:
  name   : "Catheria Bara"
  avatar : "/assets/images/bio-photo.jpg" # Ensure you upload your photo here!
  bio    : "Computer Engineering Student (3.84 GPA) & YTB Scholar. Developing AI solutions for healthcare and impact."
  location: "Antalya, Turkey"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Catheria29"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/cath%C3%A9ria-bara-30506b217/" # Update with your actual LinkedIn slug
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:baracatheriaclaire@gmail.com"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Defaults for Posts and Pages
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Archive Settings
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
